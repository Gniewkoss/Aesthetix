services:
  ai-backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - MODEL_DIR=/app/artifacts/models
      - DATA_ROOT=/app/data
      - ALLOWED_ORIGINS=http://localhost:8081,https://your-supabase-project.supabase.co
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    volumes:
      # Persist model artifacts between container restarts
      - ./artifacts:/app/artifacts
      # Mount dataset dir for training
      - ./data:/app/data
      # LSP / MPII downloads (fetch on host, process in container)
      - ./datasets:/app/datasets
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Optional: GPU variant (uncomment and install nvidia-docker2)
