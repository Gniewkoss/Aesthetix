# PhysiqueMax Training Configuration
# ─────────────────────────────────────────────────────────────────────────────

# ── Data ─────────────────────────────────────────────────────────────────────
data:
  synthetic_path: data/train.jsonl
  manual_labels_path: data/manual_labels.jsonl
  pairwise_labels_path: data/pairwise_labels.jsonl
  feature_cache_dir: data/feature_cache
  image_dir: data/images
  val_split: 0.15
  synthetic_weight: 0.5       # down-weight synthetic vs real (0.5 = trust half as much)
  manual_weight: 1.0

# ── Stage 3: Supervised head training ────────────────────────────────────────
stage3:
  epochs: 300
  batch_size: 64
  lr: 1e-3
  weight_decay: 1e-4
  scheduler: cosine
  patience: 40
  lambda_huber: 0.5           # weight of Huber vs NLL loss
  grad_clip: 1.0
  output: artifacts/models/muscle_heads.pt
  # Loss functions:
  #   L = NLL_Gaussian(μ, σ², y) + λ_huber * Huber(μ, y)
  # NLL: L = 0.5 * [(y-μ)²/σ² + log(σ²)]
  # Huber: L = 0.5*(y-μ)² if |y-μ|<δ else δ(|y-μ|-δ/2), δ=1.0

# ── Stage 4: Ranking fine-tuning ──────────────────────────────────────────────
stage4:
  epochs: 100
  batch_size: 32
  lr: 5e-4
  weight_decay: 1e-4
  lambda_pairwise: 0.7        # Bradley-Terry pairwise ranking loss weight
  lambda_contrastive: 0.3     # NT-Xent contrastive loss weight
  margin_triplet: 2.0
  margin_pairwise: 1.0
  min_pairs_required: 10      # skip if fewer pairs available
  output: artifacts/models/ranking_model.pt
  # Loss functions:
  #   Pairwise: L = max(0, margin - preferred*(score_a - score_b))
  #   Triplet:  L = max(0, m - (pos-anc)) + max(0, m - (anc-neg))
  #   NT-Xent:  L = -log[ exp(sim(a,b)/τ) / Σ_j exp(sim(a,j)/τ) ]

# ── Stage 5: Calibration ──────────────────────────────────────────────────────
stage5:
  min_manual_labels: 20       # minimum absolute labels for isotonic calibration
  calibration_type: isotonic  # options: isotonic | platt | linear
  output: artifacts/models/ranking_calibrator.pkl

# ── Augmentation ──────────────────────────────────────────────────────────────
augmentation:
  enabled: true
  brightness_range: [0.7, 1.3]
  contrast_range: [0.8, 1.2]
  hue_shift_deg: 10
  flip_horizontal: true
  flip_prob: 0.5
  crop_scale: [0.85, 1.0]
  rotation_deg: 5

# ── Evaluation ────────────────────────────────────────────────────────────────
evaluation:
  metrics:
    - mae
    - spearman_rho
    - ranking_accuracy     # pairwise: fraction of correctly ordered pairs
    - calibration_ece      # Expected Calibration Error (uncertainty quality)
  target_mae: 1.5          # target MAE on held-out set (0-10 scale)
  target_ranking_acc: 0.72 # target pairwise ranking accuracy

# ── MLflow / Experiment tracking ──────────────────────────────────────────────
mlflow:
  enabled: false            # set true when MLflow server is available
  tracking_uri: http://localhost:5000
  experiment: physique-max-v3

# ── Synthetic data generation ─────────────────────────────────────────────────
synthetic:
  n_samples: 2000
  n_archetypes: 20
  seed: 42
  noise_scale: 1.0
  include_ranking_pairs: true   # auto-generate pairwise labels from synthetic
  n_pairs_per_muscle: 500
