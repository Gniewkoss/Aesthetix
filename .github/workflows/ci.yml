name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    name: Type-check & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Unit tests
        run: npm run test:ci

  # ── Build & submit (enable once EAS secrets are configured) ─────────────────────
